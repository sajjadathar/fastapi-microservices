name: CD - Build and Push to Docker Hub

on:
  push:
    branches:
      - staging

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/user_service/Dockerfile
          push: true
          tags: |
            sajjadathar/user-service:staging-${{ github.sha }}
            sajjadathar/user-service:staging-latest

      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/product_service/Dockerfile
          push: true
          tags: |
            sajjadathar/product-service:staging-${{ github.sha }}
            sajjadathar/product-service:staging-latest

      - name: Build and push inventory-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/inventory_service/Dockerfile
          push: true
          tags: |
            sajjadathar/inventory-service:staging-${{ github.sha }}
            sajjadathar/inventory-service:staging-latest

      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/order_service/Dockerfile
          push: true
          tags: |
            sajjadathar/order-service:staging-${{ github.sha }}
            sajjadathar/order-service:staging-latest