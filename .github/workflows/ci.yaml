name: CI - Run Tests

on:
  push:
    branches:
      - 'feature/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install user_service dependencies
        run: uv sync --package user_service --frozen

      - name: Run tests
        run: uv run pytest services/user_service/tests/ -v