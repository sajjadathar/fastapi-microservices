name: Microservices CI/CD

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Tests (User Service)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd services/user-service
          uv sync
          uv run pytest
      - name: Build Docker Image
        run: |
          # We tag the image using the unique commit hash
          docker build -t my-company/user-service:${{ github.sha }} -f services/user-service/Dockerfile .
         
          # In a real production environment, you would add a step here to:
          # docker push my-company/user-service:${{ github.sha }}
          # And then tell Kubernetes to update the deployment to use this new tag!